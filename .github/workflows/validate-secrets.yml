name: Validate Secrets
on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  validate:
    name: Validate required secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.API_KEY_FILE_CONTENT_BASE64 }}" ]; then echo "MISSING: API_KEY_FILE_CONTENT_BASE64"; missing=1; fi
          if [ -z "${{ secrets.JSON_FILE_CONTENT_BASE64 }}" ]; then echo "MISSING: JSON_FILE_CONTENT_BASE64"; missing=1; fi
          if [ -z "${{ secrets.TELEGRAM_API_HASH }}" ]; then echo "WARNING: TELEGRAM_API_HASH not set (optional)"; fi
          if [ "$missing" -eq 1 ]; then echo "One or more required secrets are missing. Aborting."; exit 1; fi
        shell: bash
