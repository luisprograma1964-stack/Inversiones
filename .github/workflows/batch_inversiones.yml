name: Ejecucion Batch Diaria

on:
  schedule:
    # Ejecuta de lunes a viernes a las 21:00 UTC (18:00 ARG)
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  run-ensamblador:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4
        
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_backend.txt
          
      - name: Inyectar Credenciales
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Creando carpeta creds y archivo API key..."
          mkdir -p creds
          echo "${GEMINI_API_KEY}" > creds/api_key.txt
          
      - name: Ejecutar Orquestador
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          python ensamblador.py
