name: Quick Smoke (no IA)
on:
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore credentials
        run: |
          echo "${{ secrets.API_KEY_FILE_CONTENT_BASE64 }}" | base64 --decode > creds/api_key.txt
          echo "${{ secrets.JSON_FILE_CONTENT_BASE64 }}" | base64 --decode > creds/python-sheets-492415-9f916d7c2cd1.json
        shell: bash

      - name: Set GOOGLE_APPLICATION_CREDENTIALS
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=creds/python-sheets-492415-9f916d7c2cd1.json" >> $GITHUB_ENV
        shell: bash

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Run smoke test (no IA)
        run: python tools/smoke_no_ia.py
        shell: bash
