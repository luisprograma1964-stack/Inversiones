name: Orquestador Diario de Inversiones

on:
  schedule:
    # 11:00 UTC = 08:00 AM Argentina (UTC-3)
    - cron: '0 11 * * 1-5' # De Lunes a Viernes a las 8 AM AR
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  ejecutar-orquestador:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # O la versión que utilices

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Orquestador (main.py)
      env:
        # Inyectando secretos como variables de entorno
        GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        # Agrega aquí cualquier otro secreto que use tu config.py
      run: |
        python main.py
